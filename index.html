<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura AI App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1f2937, #3b82f6);
      color: #f8fafc;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    main {
      max-width: 700px;
      padding: 2rem;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.88);
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin-bottom: 0.5rem;
      font-size: clamp(2rem, 4vw, 4rem);
    }
    p {
      line-height: 1.75;
      margin-bottom: 1.25rem;
      font-size: 1.05rem;
    }
    .card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 1.25rem;
      margin-top: 1rem;
      color: #e2e8f0;
    }
    a {
      color: #93c5fd;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>Aura AI App</h1>
    <p>Welcome to the Aura AI demo page. This site is deployed from your GitHub repository to Azure App Service.</p>
    <div class="card">
      <p>App deployed at:</p>
      <p><a href="https://aura-ai-aufge4g3geech2g3.centralindia-01.azurewebsites.net" target="_blank">aura-ai-aufge4g3geech2g3.centralindia-01.azurewebsites.net</a></p>
    </div>
  </main>
</body>
</html>
